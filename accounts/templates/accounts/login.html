{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <title>{% trans "ログイン" %} - {% trans "アニメ聖地巡礼" %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="main-content">
        <h1>{% trans "ログイン" %}</h1>

        <div class="form-container">
            <form method="post">
                {% csrf_token %}
                <div class="django-form">
                    {{ form.as_p }}
                </div>
                <button type="submit" style="width: 100%; margin-top: 10px;">
                    {% trans "ログインする" %}
                </button>
            </form>
            
            <p style="margin-top: 25px; text-align: center; font-size: 0.9em;">
                {% trans "アカウントをお持ちでないですか？" %} <br>
                <a href="{% url 'signup' %}" style="font-weight: bold;">
                    {% trans "新規アカウント登録はこちら" %}
                </a>
            </p>
            <div style="text-align: center; margin-top: 15px;">
                <a href="{% url 'home' %}" style="color: #888;">{% trans "ホームへ戻る" %}</a>
            </div>
        </div>
    </div>
</body>
</html>
